{% extends 'base.html' %}

{% block title %}Waiting Room - Quiz Platform{% endblock %}

{% block content %}
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined">

<div class="page-layout">
    
    <!-- Starfield Layer -->
    <div id="star-container"></div>

    <!-- Interactive Candidate Bubbles Layer (Floating in space) -->
    <div id="bubble-container"></div>

    <!-- Bottom Status Bar (Compact) -->
    <div class="bottom-dock">
        <div class="glass-bar">
            
            <!-- Loading Indicator / Countdown Circle -->
            <div class="status-icon-container">
                <div class="spinner" id="status-spinner"></div>
                <div class="countdown-num" id="countdown-display" style="display: none;">3</div>
            </div>

            <!-- Text Info -->
            <div class="status-content">
                <h2 id="main-status-text">Waiting for Host</h2>
                <div class="sub-info">
                    <span id="waiting-count-text">You and <span id="count-num">0</span> others waiting</span>
                    <span class="dot-separator">•</span>
                    <span class="event-meta">{{ event.name }} (R{{ round.round_number }})</span>
                </div>
            </div>

            <!-- Exit Button (Integrated into bar) -->
            <button class="icon-btn" onclick="exitWaiting()" title="Exit Room">
                <span class="material-icons-outlined">logout</span>
            </button>
        </div>
    </div>

    <!-- Full Screen Overlay for "Session Ended" error -->
    <div id="error-overlay" class="error-overlay">
        <div class="error-box">
            <span class="material-icons-outlined">error_outline</span>
            <h3>Session Ended</h3>
            <p>The host has ended this round.</p>
        </div>
    </div>

</div>

<style>
    /* --- THEME VARIABLES --- */
    :root {
        --space-bg: #050510;
        --glass-bg: rgba(20, 20, 30, 0.65);
        --glass-border: rgba(255, 255, 255, 0.1);
        --accent: #6366f1;
        --text-main: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.5);
        --font-sans: 'Inter', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: var(--font-sans);
        background-color: var(--space-bg);
        color: var(--text-main);
        width: 100vw;
        height: 100vh;
        overflow: hidden;
    }

    /* --- LAYOUT & BACKGROUND --- */
    .page-layout {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: var(--space-bg);
        overflow: hidden;
    }

    /* --- STARS --- */
    #star-container {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 0;
        pointer-events: none;
    }

    .star {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.8;
    }

    /* --- BUBBLES --- */
    #bubble-container {
        position: absolute;
        width: 100%; height: 100%;
        z-index: 1;
        pointer-events: none;
    }
    
    .bubble {
        position: absolute;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 0.75rem;
        color: rgba(255,255,255,0.9);
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        padding: 4px;
    }

    .bubble.is-me {
        background: rgba(99, 102, 241, 0.4);
        border: 1px solid rgba(99, 102, 241, 0.8);
        color: #fff;
        font-weight: 600;
        z-index: 2;
        box-shadow: 0 0 25px rgba(99, 102, 241, 0.4);
    }

    /* --- BOTTOM DOCK UI --- */
    .bottom-dock {
        position: fixed;
        bottom: 40px;
        left: 0; 
        width: 100%;
        display: flex;
        justify-content: center;
        z-index: 50;
    }

    .glass-bar {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
        min-width: 320px;
        max-width: 90%;
    }

    /* Spinner & Countdown */
    .status-icon-container {
        position: relative;
        width: 40px; height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .spinner {
        width: 24px; height: 24px;
        border: 2px solid rgba(255,255,255,0.1);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .countdown-num {
        font-size: 1.5rem;
        font-weight: 700;
        color: #4ade80;
    }

    /* Text Content */
    .status-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    #main-status-text {
        font-size: 0.95rem;
        font-weight: 600;
        margin-bottom: 2px;
        letter-spacing: 0.3px;
    }

    .sub-info {
        font-size: 0.75rem;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .dot-separator { font-size: 1.2rem; line-height: 0; margin-top: -2px; opacity: 0.5; }

    /* Exit Button */
    .icon-btn {
        background: rgba(255, 255, 255, 0.05);
        border: none;
        color: #f87171;
        width: 36px; height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
    }

    .icon-btn:hover {
        background: rgba(239, 68, 68, 0.15);
        color: #fca5a5;
    }
    
    .icon-btn span { font-size: 1.2rem; }

    /* --- ERROR OVERLAY --- */
    .error-overlay {
        position: fixed; top:0; left:0; width:100%; height:100%;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(8px);
        z-index: 100;
        display: none;
        align-items: center;
        justify-content: center;
    }

    .error-box {
        text-align: center;
    }

    .error-box span { font-size: 3rem; color: #ef4444; margin-bottom: 10px; display: block; }
    .error-box h3 { font-size: 1.5rem; margin-bottom: 5px; }
    .error-box p { color: var(--text-muted); }

    /* --- RESPONSIVE --- */
    @media (max-width: 480px) {
        .glass-bar { width: 90%; padding: 10px 15px; }
        .bottom-dock { bottom: 20px; }
        .sub-info { font-size: 0.7rem; }
        .event-meta { display: none; } /* Hide event name on very small screens */
    }
</style>

<script>
    // --- Configuration ---
    const candidateEntryId = "{{ candidate_entry_id|default:'null' }}";
    const eventId = "{{ event.id }}";
    const roundNumber = "{{ round.round_number }}";
    const currentCandidateName = "{{ candidate_name }}";
    
    let isRedirecting = false;

    // --- Prevent access on page refresh ---
    const sessionKey = `waiting_session_${candidateEntryId}`;
    let isFirstVisit = false;
    if (!sessionStorage.getItem(sessionKey)) {
        // First visit, set the session marker
        sessionStorage.setItem(sessionKey, 'active');
        isFirstVisit = true;
    } else {
        // Page refresh detected - redirect to login
        isRedirecting = true;
        window.location.replace('/login/candidate/');
    }

    // --- Starfield Generation ---
    function createStars() {
        const container = document.getElementById('star-container');
        const starCount = 150;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const size = Math.random() * 2 + 1;

            star.style.left = `${x}%`;
            star.style.top = `${y}%`;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            
            container.appendChild(star);
        }
    }

    // --- Bubble System (Retained but subtly styled) ---
    const bubbleContainer = document.getElementById('bubble-container');
    let bubbles = []; 

    function createBubble(name, isMe = false) {
        const el = document.createElement('div');
        el.className = 'bubble';
        if (isMe) el.classList.add('is-me');
        el.textContent = name;
        
        const size = Math.floor(Math.random() * 30) + 60;
        el.style.width = `${size}px`;
        el.style.height = `${size}px`;

        const x = Math.random() * (window.innerWidth - size);
        const y = Math.random() * (window.innerHeight - size);
        const dx = (Math.random() - 0.5) * 0.5;
        const dy = (Math.random() - 0.5) * 0.5;

        el.style.transform = `translate(${x}px, ${y}px)`;
        bubbleContainer.appendChild(el);

        return { el, x, y, dx, dy, size, name };
    }

    if(currentCandidateName) { bubbles.push(createBubble("You", true)); }

    function animateBubbles() {
        const width = window.innerWidth;
        const height = window.innerHeight;

        bubbles.forEach(b => {
            b.x += b.dx;
            b.y += b.dy;

            if (b.x + b.size > width) {
                b.dx = -Math.abs(b.dx);
                b.x = width - b.size;
            }
            if (b.x < 0) {
                b.dx = Math.abs(b.dx);
                b.x = 0;
            }
            if (b.y + b.size > height) {
                b.dy = -Math.abs(b.dy);
                b.y = height - b.size;
            }
            if (b.y < 0) {
                b.dy = Math.abs(b.dy);
                b.y = 0;
            }
            
            b.el.style.transform = `translate(${b.x}px, ${b.y}px)`;
        });
        requestAnimationFrame(animateBubbles);
    }

    // --- On Page Load/Refresh: Ensure candidate is properly registered ---
    async function initializeWaitingStatus() {
        if (candidateEntryId && candidateEntryId !== "null") {
            // Update activity immediately to ensure they don't get filtered out
            updateCandidateActivity();
            
            // Mark as waiting in case of refresh
            const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
            try {
                await fetch(`/api/init-waiting/${candidateEntryId}/`, {
                    method: 'POST',
                    headers: { 'X-CSRFToken': csrfToken, 'Content-Type': 'application/json' },
                    keepalive: true
                });
            } catch (err) {
                console.debug("Init waiting failed:", err.message);
            }
        }
    }



    // --- Logic: Countdown & Redirect ---

    function triggerStartSequence() {
        isRedirecting = true;
        
        const mainText = document.getElementById('main-status-text');
        const subInfo = document.querySelector('.sub-info');
        const spinner = document.getElementById('status-spinner');
        const countDisplay = document.getElementById('countdown-display');
        const glassBar = document.querySelector('.glass-bar');

        // Visual Updates for "Started"
        mainText.textContent = "Round Started!";
        mainText.style.color = "#4ade80"; // Green color
        subInfo.style.display = "none"; // Hide waiting count
        
        spinner.style.display = "none";
        countDisplay.style.display = "block";
        glassBar.style.borderColor = "rgba(74, 222, 128, 0.5)"; // Green border glow

        let count = 3;
        countDisplay.textContent = count;

        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                countDisplay.textContent = count;
            } else {
                clearInterval(timer);
                countDisplay.textContent = "Go!";
                // Clear session marker before moving to quiz
                sessionStorage.removeItem(sessionKey);
                window.location.replace(`/quiz-test/${eventId}/${roundNumber}/`);
            }
        }, 1000);
    }

    // --- Networking & Status Checks ---

    function updateBubbles(candidatesList) {
        const serverNames = candidatesList.map(c => c.name);
        const existingNames = bubbles.map(b => b.name);
        
        serverNames.forEach(name => {
            if (name === currentCandidateName) return;
            if (!existingNames.includes(name)) {
                bubbles.push(createBubble(name));
            }
        });

        const count = candidatesList.length > 0 ? candidatesList.length - 1 : 0;
        document.getElementById('count-num').textContent = Math.max(0, count);
    }

    function loadWaitingMembers() {
        if(isRedirecting) return;
        fetch(`/api/get-candidates/${eventId}/${roundNumber}/`)
            .then(r => r.json())
            .then(data => {
                if (data.success && Array.isArray(data.candidates)) updateBubbles(data.candidates);
            })
            .catch(console.error);
    }

    function updateCandidateActivity() {
        if (!candidateEntryId || candidateEntryId === "null") return;
        const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
        fetch(`/api/update-candidate-active/${candidateEntryId}/`, {
            method: 'POST',
            headers: { 'X-CSRFToken': csrfToken, 'Content-Type': 'application/json' }
        }).catch(() => {});
    }

    function checkStatus() {
        if (isRedirecting) return;

        // Check Round Start
        fetch(`/api/check-round-started/${eventId}/${roundNumber}/`)
            .then(r => r.json())
            .then(data => {
                if (data.started === true) {
                    triggerStartSequence();
                }
            })
            .catch(console.error);

        // Check Hosted Status
        fetch(`/api/check-hosting-status/${eventId}/${roundNumber}/`)
            .then(r => r.json())
            .then(data => {
                if (data.is_hosting === false && data.is_started === false) {
                    isRedirecting = true;
                    document.getElementById('error-overlay').style.display = 'flex';
                    // Clear session marker on error
                    sessionStorage.removeItem(sessionKey);
                    setTimeout(() => window.location.replace('/login/candidate/'), 3000);
                }
            })
            .catch(console.error);
    }

    function exitWaiting() {
        if (confirm('Leave the waiting room?')) {
            isRedirecting = true;
            if (candidateEntryId && candidateEntryId !== "null") {
                navigator.sendBeacon(`/api/exit-waiting/${candidateEntryId}/`);
            }
            // Clear session marker on exit
            sessionStorage.removeItem(sessionKey);
            window.location.replace('/login/candidate/');
        }
    }

    // --- Initialization ---
    createStars();
    animateBubbles();
    
    // Initialize and start polling
    (async () => {
        // Register candidate only on first visit (not on refresh)
        if (isFirstVisit) {
            await initializeWaitingStatus();
        }
        
        // API Polling
        updateCandidateActivity();
        loadWaitingMembers();
        checkStatus();
        
        setInterval(checkStatus, 1000);
        setInterval(loadWaitingMembers, 3000);
        setInterval(updateCandidateActivity, 15000);
    })();

    // Unload handling - Exit on refresh/close/tab close/internet drop
    window.addEventListener('beforeunload', () => {
        if (!isRedirecting && candidateEntryId && candidateEntryId !== "null") {
            navigator.sendBeacon(`/api/exit-waiting/${candidateEntryId}/`);
        }
        // Clear session marker on unload so they can enter waiting room again if needed
        sessionStorage.removeItem(sessionKey);
    });

    // Handle visibility change (tab hidden)
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            if (!isRedirecting && candidateEntryId && candidateEntryId !== "null") {
                navigator.sendBeacon(`/api/exit-waiting/${candidateEntryId}/`);
            }
        }
    });
</script>
{% endblock %}
