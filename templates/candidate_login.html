{% extends 'base.html' %}

{% block title %}Join Quiz - Quiz Platform{% endblock %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<div class="page-layout">
    
    <div class="content-wrapper">
        
        <!-- Center Card -->
        <div class="auth-card">
            <!-- Header -->
            <div class="card-header">
                <div class="brand-logo">
                    <svg class="logo-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                    </svg>
                </div>
                <h2 class="form-title">Join Quiz</h2>
                <p class="header-subtitle">Enter your details to begin assessment</p>
            </div>

            <!-- Alert Container -->
            <div id="alert-container"></div>
            {% if messages %}
                {% for message in messages %}
                    <script>
                        document.addEventListener('DOMContentLoaded', () => {
                            displayMessage("{{ message }}", "{{ message.tags }}");
                        });
                    </script>
                {% endfor %}
            {% endif %}

            <!-- Form -->
            <form method="POST" id="login-form">
                {% csrf_token %}

                <div class="form-group">
                    <label class="input-label" for="candidate_name">Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="candidate_name" name="candidate_name" class="form-input" placeholder="e.g. John Doe" required autofocus>
                        <div class="input-icon">
                            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="input-label" for="access_code">Access Code</label>
                    <div class="input-wrapper">
                        <input type="password" id="access_code" name="access_code" class="form-input" placeholder="Enter code" required>
                        <div class="input-icon">
                            <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                            </svg>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <span>Enter Assessment</span>
                </button>
            </form>

            <!-- Footer -->
            <div class="form-footer">
                <a href="{% url 'login_choice' %}" class="link-back">
                    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Back to Selection
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    /* --- VARIABLES & RESET --- */
    :root {
        --brand-bg: #064e3b; /* Deep Emerald */
        --brand-accent: #10b981;
        --card-bg: #ffffff;
        --text-dark: #1e293b;
        --text-muted: #64748b;
        --input-border: #cbd5e1;
        --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        width: 100%;
        height: 100%;
        font-family: var(--font-sans);
        background-color: var(--brand-bg);
        color: var(--text-dark);
    }

    /* --- LAYOUT --- */
    .page-layout {
        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        /* Subtle texture over green background */
        background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
    }

    .content-wrapper {
        width: 100%;
        display: flex;
        justify-content: center;
    }

    /* --- WHITE CARD --- */
    .auth-card {
        width: 100%;
        max-width: 420px;
        background: var(--card-bg);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    /* --- HEADER --- */
    .card-header {
        text-align: center;
        margin-bottom: 32px;
    }

    .brand-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 56px;
        background: #ecfdf5;
        color: #059669;
        border-radius: 12px;
        margin-bottom: 20px;
    }

    .logo-icon { width: 28px; height: 28px; }

    .form-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 8px;
    }

    .header-subtitle {
        color: var(--text-muted);
        font-size: 0.95rem;
    }

    /* --- FORM INPUTS --- */
    .form-group { margin-bottom: 20px; }

    .input-label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #334155;
        margin-bottom: 8px;
        display: block;
    }

    .input-wrapper { position: relative; }

    .form-input {
        width: 100%;
        height: 48px;
        padding: 0 40px 0 16px;
        background: #f8fafc;
        border: 1px solid var(--input-border);
        border-radius: 8px;
        color: var(--text-dark);
        font-size: 1rem;
        font-family: var(--font-sans);
        transition: all 0.2s ease;
    }

    .form-input::placeholder { color: #94a3b8; }

    .form-input:focus {
        outline: none;
        background: #fff;
        border-color: var(--brand-accent);
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .input-icon {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        pointer-events: none;
        transition: color 0.2s;
    }

    .form-input:focus + .input-icon { color: var(--brand-accent); }

    /* --- BUTTON --- */
    .btn-submit {
        width: 100%;
        height: 48px;
        border: none;
        border-radius: 8px;
        background: var(--brand-bg);
        color: white;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 8px;
    }

    .btn-submit:hover {
        background-color: #065f46; /* Slightly lighter on hover */
    }
    
    .btn-submit:disabled {
        opacity: 0.7;
        cursor: not-allowed;
    }

    /* --- FOOTER --- */
    .form-footer { margin-top: 24px; text-align: center; }

    .link-back {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.9rem;
        color: var(--text-muted);
        text-decoration: none;
        transition: color 0.2s;
    }

    .link-back:hover { color: var(--brand-bg); }

    /* --- ALERTS --- */
    .alert-message {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 24px;
        font-size: 0.9rem;
        display: block;
        text-align: left;
    }

    .alert-error {
        background: #fef2f2;
        border: 1px solid #fee2e2;
        color: #991b1b;
    }
    
    .alert-success {
        background: #ecfdf5;
        border: 1px solid #d1fae5;
        color: #065f46;
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 480px) {
        .auth-card { padding: 32px 20px; }
        .form-title { font-size: 1.5rem; }
    }
</style>

<script>
    function displayMessage(message, type = 'error') {
        const container = document.getElementById('alert-container');
        const isError = type.includes('error') || (!type.includes('success'));
        const bgClass = isError ? 'alert-error' : 'alert-success';

        const alertHTML = `
            <div class="alert-message ${bgClass}">
                <span>${message}</span>
            </div>
        `;
        container.innerHTML = alertHTML;
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
        const btn = document.querySelector('.btn-submit');
        
        const name = document.getElementById('candidate_name').value.trim();
        const code = document.getElementById('access_code').value.trim();

        if (!name || !code) {
            e.preventDefault();
            displayMessage('Please fill in all fields.', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span>Processing...</span>';
    });
</script>
{% endblock %}
