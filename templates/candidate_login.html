{% extends 'base.html' %}

{% block title %}Join Quiz - Quiz Platform{% endblock %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<div class="quiz-login-container">
    <div class="login-card">
        <div class="card-header">
            <svg class="header-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4m-4-6l2.293-2.293a1 1 0 111.414 1.414L12 7m0 0l-2.707-2.707a1 1 0 00-1.414 1.414L12 7" />
            </svg>
            <h1 class="header-title">Join Quiz</h1>
            <p class="header-subtitle">Secure access for registered candidates</p>
        </div>

        <div id="alert-container"></div>
        {% if messages %}
            {% for message in messages %}
                <script>
                    document.addEventListener('DOMContentLoaded', () => {
                        displayMessage("{{ message }}", "{{ message.tags }}");
                    });
                </script>
            {% endfor %}
        {% endif %}

        <form method="POST" id="login-form">
            {% csrf_token %}

            <div class="form-group">
                <label class="input-label" for="candidate_name">Full Name</label>
                <input type="text" id="candidate_name" name="candidate_name" class="form-input" placeholder="John Doe" required autofocus>
            </div>

            <div class="form-group">
                <label class="input-label" for="access_code">Access Code</label>
                <input type="password" id="access_code" name="access_code" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-submit">Join Quiz</button>
        </form>

        <div class="form-footer">
            <a href="{% url 'login_choice' %}" class="link-back">← Back to login selection</a>
        </div>
    </div>
</div>

<style>
:root {
    --primary: #4f46e5;
    --primary-soft: #eef2ff;
    --text: #111827;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --surface: #ffffff;
    --canvas: #f4f6fb;
    --error: #b91c1c;
    --success: #047857;
}

* { box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    background:
        radial-gradient(circle at top left, #eef2ff 0%, transparent 45%),
        radial-gradient(circle at bottom right, #ede9fe 0%, transparent 40%),
        var(--canvas);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
}

.quiz-login-container {
    width: 100%;
    padding: 24px;
    display: flex;
    justify-content: center;
}

.login-card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border-radius: 14px;
    padding: 36px;
    box-shadow:
        0 10px 25px rgba(17, 24, 39, 0.08),
        0 4px 10px rgba(17, 24, 39, 0.04);
}

.card-header {
    text-align: center;
    margin-bottom: 28px;
}

.header-icon {
    width: 40px;
    height: 40px;
    color: var(--primary);
    margin-bottom: 12px;
}

.header-title {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 6px;
}

.header-subtitle {
    font-size: 0.9rem;
    color: var(--text-muted);
}

.form-group {
    margin-bottom: 18px;
}

.input-label {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
}

.form-input {
    width: 100%;
    height: 46px;
    padding: 0 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 0.95rem;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.form-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-soft);
}

.btn-submit {
    width: 100%;
    height: 46px;
    border-radius: 10px;
    border: none;
    background: var(--primary);
    color: #ffffff;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.2s, transform 0.15s;
}

.btn-submit:hover {
    background: #4338ca;
    transform: translateY(-1px);
}

.form-footer {
    margin-top: 22px;
    text-align: center;
}

.link-back {
    font-size: 0.85rem;
    color: var(--text-muted);
    text-decoration: none;
}

.link-back:hover {
    color: var(--primary);
}

@media (max-width: 480px) {
    .login-card {
        padding: 28px 22px;
    }
}
</style>

<script>
function displayMessage(message, type = 'error') {
    const container = document.getElementById('alert-container');
    const isError = type !== 'success';
    const bgClass = isError ? 'alert-error' : 'alert-success';

    const alertHTML = `
        <div class="alert-message ${bgClass}">
            <span>${message}</span>
        </div>
    `;
    container.innerHTML = alertHTML;
}

document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const candidateName = document.getElementById('candidate_name').value.trim();
    const accessCode = document.getElementById('access_code').value.trim();
    const btn = document.querySelector('.btn-submit');

    if (!candidateName) {
        displayMessage('Please enter your name.', 'error');
        return;
    }

    if (!accessCode) {
        displayMessage('Please enter the access code.', 'error');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = 'Joining...';
    this.submit();
});
</script>
{% endblock %}
